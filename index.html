<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Trackpad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Status Bar -->
        <div class="status-bar">
            <div id="status" class="status disconnected">●</div>
            <span class="title">Trackpad</span>
        </div>
        
        <!-- Trackpad Area -->
        <div id="trackpad" class="trackpad">
            <div class="trackpad-texture"></div>
        </div>
        
        <!-- Physical Buttons -->
        <div class="physical-buttons">
            <button id="leftClick" class="physical-btn left"></button>
            <button id="rightClick" class="physical-btn right"></button>
        </div>
        
        <!-- Scroll Buttons -->
        <div class="scroll-controls">
            <button id="scrollUp" class="scroll-btn">▲</button>
            <button id="scrollDown" class="scroll-btn">▼</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
